<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-TRACK - Complaints Management</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="theme.js"></script>
  <!-- Runtime Configuration -->
  <script src="runtime-config.js"></script>
  <!-- Auth API Helper -->
  <script src="auth-api.js"></script>
</head>
<body class="monitoring-page">
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="app-sidebar bg-white">
      <div class="sidebar-logo" style="cursor: pointer;" onclick="window.location.href='dashboard.html'">
         <div class="icon-circle bg-lime text-black" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
            <i class="ph-fill ph-fire"></i>
         </div>
         <div class="logo-text">
            <h2>G-TRACK</h2>
            <span>DISTRIBUTOR</span>
         </div>
      </div>

      <nav class="sidebar-nav">
         <a href="dashboard.html" class="nav-item"><i class="ph-fill ph-squares-four"></i> Dashboard</a>
         <a href="registered-consumers.html" class="nav-item"><i class="ph ph-users"></i> Consumers</a>
         <a href="distributor-complaints.html" class="nav-item active bg-lime"><i class="ph ph-warning-circle"></i> Complaints</a>
         <a href="admin-distributor-requests.html" class="nav-item"><i class="ph ph-list"></i> Requests</a>
      </nav>

      <div class="sidebar-bottom">
      </div>
    </aside>

    <!-- Main Content -->
    <main class="app-main">
      <header class="main-header" style="margin-bottom: 24px;">
         <h1 style="font-size: 2rem;">Complaints Management</h1>
      </header>

      <!-- Filter and Stats -->
      <div class="stats-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;">
         <div class="card bg-white" style="padding: 20px; text-align: center;">
            <div style="font-size: 2rem; font-weight: 700; color: var(--black);" id="stat-open">0</div>
            <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 8px;">Open Complaints</div>
         </div>
         <div class="card bg-white" style="padding: 20px; text-align: center;">
            <div style="font-size: 2rem; font-weight: 700; color: var(--black);" id="stat-in-progress">0</div>
            <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 8px;">In Progress</div>
         </div>
         <div class="card bg-white" style="padding: 20px; text-align: center;">
            <div style="font-size: 2rem; font-weight: 700; color: var(--black);" id="stat-resolved">0</div>
            <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 8px;">Resolved</div>
         </div>
         <div class="card bg-white" style="padding: 20px; text-align: center;">
            <div style="font-size: 2rem; font-weight: 700; color: var(--black);" id="stat-total">0</div>
            <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 8px;">Total</div>
         </div>
      </div>

      <!-- Filter Controls -->
      <div class="card bg-white" style="padding: 24px; margin-bottom: 24px; display: flex; gap: 16px; align-items: center;">
         <div style="display: flex; gap: 8px; align-items: center;">
            <label style="font-weight: 500;">Filter by Status:</label>
            <select id="status-filter" style="padding: 10px 14px; border: 1px solid var(--grey); border-radius: 8px; background: transparent; color: var(--black);">
               <option value="">All Statuses</option>
               <option value="Open">Open</option>
               <option value="In Progress">In Progress</option>
               <option value="Resolved">Resolved</option>
               <option value="Closed">Closed</option>
            </select>
         </div>
      </div>

      <!-- Complaints List -->
      <div class="card bg-white" style="padding: 32px;">
         <h2 style="margin-bottom: 24px;">Complaints Inbox</h2>
         
         <div id="complaints-list" style="display: flex; flex-direction: column; gap: 16px;">
            <!-- Complaints loaded here -->
         </div>
      </div>
    </main>
  </div>

  <!-- Distributor Complaints Script -->
  <script src="distributor-complaints.js"></script>
</body>
</html>
