<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-TRACK - User Profile</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="theme.js"></script>
</head>
<body class="monitoring-page">
  <div class="app-layout">
    <aside class="app-sidebar bg-white">
      <div class="sidebar-logo" style="cursor: pointer;" onclick="window.location.href='dashboard.html'">
        <div class="icon-circle bg-lime text-black" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
          <i class="ph-fill ph-fire"></i>
        </div>
        <div class="logo-text">
          <h2>G-TRACK</h2>
          <span>SMART MONITORING</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="monitoring.html" class="nav-item"><i class="ph-fill ph-squares-four"></i> Dashboard</a>
        <a href="report.html" class="nav-item"><i class="ph ph-chart-bar"></i> Reports</a>
        <a href="refill-history.html" class="nav-item"><i class="ph ph-clock-counter-clockwise"></i> Refill History</a>
        <a href="complaints.html" class="nav-item"><i class="ph ph-warning-circle"></i> Complaints</a>
        <a href="settings.html" class="nav-item"><i class="ph ph-gear"></i> Settings</a>
      </nav>
    </aside>

    <main class="app-main">
      <header class="main-header" style="margin-bottom: 24px;">
        <h1 style="font-size: 2rem;">Distributor Profile</h1>
      </header>

      <div class="card bg-white" style="padding: 0; overflow: hidden;">
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 24px 28px; border-bottom: 1px solid var(--grey);">
          <h2 style="margin: 0; font-size: 1.6rem;" id="profile-welcome">Welcome...</h2>
          <div class="icon-circle bg-grey text-black"><i class="ph ph-user"></i></div>
        </div>

        <div style="display: grid; grid-template-columns: 240px 1fr; border-bottom: 1px solid var(--grey);">
          <div style="padding: 14px 20px; font-weight: 600; background: rgba(0,0,0,0.02);">Distributor ID</div>
          <div style="padding: 14px 20px;" id="profile-id">--</div>
        </div>
        <div style="display: grid; grid-template-columns: 240px 1fr; border-bottom: 1px solid var(--grey);">
          <div style="padding: 14px 20px; font-weight: 600;">Email</div>
          <div style="padding: 14px 20px;" id="profile-email">--</div>
        </div>
        <div style="display: grid; grid-template-columns: 240px 1fr; border-bottom: 1px solid var(--grey);">
          <div style="padding: 14px 20px; font-weight: 600; background: rgba(0,0,0,0.02);">Cell phone</div>
          <div style="padding: 14px 20px;" id="profile-phone">--</div>
        </div>
        <div style="display: grid; grid-template-columns: 240px 1fr; border-bottom: 1px solid var(--grey);">
          <div style="padding: 14px 20px; font-weight: 600;">Address</div>
          <div style="padding: 14px 20px;" id="profile-address">--</div>
        </div>
        <div style="display: grid; grid-template-columns: 240px 1fr; border-bottom: 1px solid var(--grey);">
          <div style="padding: 14px 20px; font-weight: 600; background: rgba(0,0,0,0.02);">State</div>
          <div style="padding: 14px 20px;" id="profile-state">--</div>
        </div>
        <div style="display: grid; grid-template-columns: 240px 1fr;">
          <div style="padding: 14px 20px; font-weight: 600;">District</div>
          <div style="padding: 14px 20px;" id="profile-district">--</div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="runtime-config.js"></script>
  <script src="auth-api.js"></script>
  <script src="user-profile.js"></script>
</body>
</html>
